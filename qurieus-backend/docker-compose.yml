# Qdrant vector database for development and production.
# Run: docker compose up -d
# Collections (qurieus_dev, qurieus) are created automatically by the app on first use.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qurieus-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (optional)
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant_storage:
