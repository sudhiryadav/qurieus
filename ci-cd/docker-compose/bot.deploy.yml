# Deploy from source - build on server instead of pulling pre-built image
# Copy to: /home/ubuntu/{staging,prod}/qurieus-bot-teams/docker-compose.deploy.yml
services:
  msteams-bot:
    build:
      context: ${REPO_DIR:-../repo}/qurieus-bot-teams
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: qurieus-msteams-bot
    restart: always
    ports:
      - "3978:3978"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3978/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
