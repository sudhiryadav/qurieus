# Deploy from source - build on server instead of pulling pre-built image
# Copy to: /home/ubuntu/{staging,prod}/qurieus-backend/docker-compose.deploy.yml
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qurieus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ${REPO_DIR:-../repo}/qurieus-backend
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: qurieus-backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  qdrant_storage:
