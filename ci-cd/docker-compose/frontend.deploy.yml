# Deploy from source - build on server instead of pulling pre-built image
# Copy to: /home/ubuntu/{staging,prod}/qurieus-frontend/docker-compose.deploy.yml
# Set REPO_DIR env: export REPO_DIR=/home/ubuntu/repo
services:
  frontend:
    build:
      context: ${REPO_DIR:-../repo}/qurieus-frontend
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: qurieus-frontend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
