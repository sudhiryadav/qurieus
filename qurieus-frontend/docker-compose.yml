services:
  frontend:
    # The image will be specified by a variable in the CI/CD pipeline.
    # A default is provided for local testing.
    image: ${FRONTEND_IMAGE:-qurieus/frontend:latest}
    platform: linux/amd64
    container_name: qurieus-frontend
    restart: always
    ports:
      - "8000:8000"
    # Environment variables from .env file
    env_file:
      - .env
    # Health check to ensure the application is running
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 