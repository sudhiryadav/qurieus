<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="50" fill="white" opacity="0.1"/>
  <circle cx="1100" cy="530" r="80" fill="white" opacity="0.1"/>
  <circle cx="200" cy="500" r="30" fill="white" opacity="0.1"/>
  
  <!-- Main content area -->
  <rect x="100" y="100" width="1000" height="430" rx="20" fill="white" opacity="0.95"/>
  
  <!-- Logo placeholder -->
  <rect x="150" y="150" width="80" height="80" rx="15" fill="#4F46E5"/>
  <text x="190" y="195" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">Q</text>
  
  <!-- Main title -->
  <text x="150" y="280" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1F2937">Qurieus</text>
  
  <!-- Subtitle -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="24" fill="#6B7280">AI-Powered Document Conversations</text>
  
  <!-- Description -->
  <text x="150" y="380" font-family="Arial, sans-serif" font-size="18" fill="#374151" max-width="900">
    Transform your documents into interactive conversations with AI
  </text>
  
  <!-- Features -->
  <g transform="translate(150, 420)">
    <circle cx="10" cy="10" r="5" fill="#4F46E5"/>
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="16" fill="#374151">Upload PDFs and train AI</text>
  </g>
  
  <g transform="translate(150, 450)">
    <circle cx="10" cy="10" r="5" fill="#4F46E5"/>
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="16" fill="#374151">Natural conversations with documents</text>
  </g>
  
  <g transform="translate(150, 480)">
    <circle cx="10" cy="10" r="5" fill="#4F46E5"/>
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="16" fill="#374151">Make content accessible and engaging</text>
  </g>
  
  <!-- CTA -->
  <rect x="150" y="520" width="200" height="50" rx="25" fill="#4F46E5"/>
  <text x="250" y="550" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Get Started</text>
  
  <!-- URL -->
  <text x="1000" y="600" font-family="Arial, sans-serif" font-size="16" fill="#6B7280" text-anchor="end">qurieus.com</text>
</svg> 