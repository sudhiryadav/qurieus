<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="numberGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradientDark)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="20" fill="#60a5fa" opacity="0.15"/>
  <circle cx="350" cy="80" r="15" fill="#60a5fa" opacity="0.12"/>
  <circle cx="320" cy="250" r="25" fill="#60a5fa" opacity="0.08"/>
  <circle cx="80" cy="220" r="18" fill="#60a5fa" opacity="0.1"/>
  
  <!-- Main 404 number -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="url(#numberGradientDark)">404</text>
  
  <!-- Page not found text -->
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="500" text-anchor="middle" fill="#94a3b8">Page Not Found</text>
  
  <!-- Search icon -->
  <g transform="translate(200, 220)">
    <!-- Magnifying glass -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#iconGradientDark)" stroke-width="2"/>
    <line x1="8" y1="8" x2="16" y2="16" stroke="url(#iconGradientDark)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative lines -->
  <line x1="100" y1="100" x2="140" y2="100" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  <line x1="260" y1="100" x2="300" y2="100" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  
  <!-- Subtle geometric shapes -->
  <polygon points="30,150 40,140 50,150 40,160" fill="#60a5fa" opacity="0.15"/>
  <polygon points="350,180 360,170 370,180 360,190" fill="#60a5fa" opacity="0.15"/>
  
  <!-- Dots pattern -->
  <circle cx="120" cy="200" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="130" cy="200" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="140" cy="200" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="260" cy="200" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="270" cy="200" r="2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="280" cy="200" r="2" fill="#60a5fa" opacity="0.5"/>
  
  <!-- Additional subtle elements for dark theme -->
  <circle cx="180" cy="60" r="3" fill="#60a5fa" opacity="0.3"/>
  <circle cx="220" cy="60" r="3" fill="#60a5fa" opacity="0.3"/>
  <circle cx="160" cy="240" r="4" fill="#60a5fa" opacity="0.2"/>
  <circle cx="240" cy="240" r="4" fill="#60a5fa" opacity="0.2"/>
</svg>
