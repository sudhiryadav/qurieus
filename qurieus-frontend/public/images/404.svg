<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="numberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3758F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="20" fill="#3758F9" opacity="0.1"/>
  <circle cx="350" cy="80" r="15" fill="#3758F9" opacity="0.08"/>
  <circle cx="320" cy="250" r="25" fill="#3758F9" opacity="0.06"/>
  <circle cx="80" cy="220" r="18" fill="#3758F9" opacity="0.09"/>
  
  <!-- Main 404 number -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="url(#numberGradient)">404</text>
  
  <!-- Page not found text -->
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="500" text-anchor="middle" fill="#64748b">Page Not Found</text>
  
  <!-- Search icon -->
  <g transform="translate(200, 220)">
    <!-- Magnifying glass -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#iconGradient)" stroke-width="2"/>
    <line x1="8" y1="8" x2="16" y2="16" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative lines -->
  <line x1="100" y1="100" x2="140" y2="100" stroke="#3758F9" stroke-width="2" opacity="0.3"/>
  <line x1="260" y1="100" x2="300" y2="100" stroke="#3758F9" stroke-width="2" opacity="0.3"/>
  
  <!-- Subtle geometric shapes -->
  <polygon points="30,150 40,140 50,150 40,160" fill="#3758F9" opacity="0.1"/>
  <polygon points="350,180 360,170 370,180 360,190" fill="#3758F9" opacity="0.1"/>
  
  <!-- Dots pattern -->
  <circle cx="120" cy="200" r="2" fill="#3758F9" opacity="0.4"/>
  <circle cx="130" cy="200" r="2" fill="#3758F9" opacity="0.4"/>
  <circle cx="140" cy="200" r="2" fill="#3758F9" opacity="0.4"/>
  <circle cx="260" cy="200" r="2" fill="#3758F9" opacity="0.4"/>
  <circle cx="270" cy="200" r="2" fill="#3758F9" opacity="0.4"/>
  <circle cx="280" cy="200" r="2" fill="#3758F9" opacity="0.4"/>
</svg>
