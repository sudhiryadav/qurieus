# GitLab CI/CD - No Docker. Push to prod/dev → SSH → git pull, build, PM2 restart.

variables:
  RUN_PIPELINE: "false"
  FORCE_FRONTEND: "false"
  FORCE_BACKEND: "false"
  FORCE_BOT: "false"

stages:
  - check_changes
  - deploy_staging
  - deploy_production

check_changes:
  stage: check_changes
  image: alpine:latest
  script:
    - apk add --no-cache git
    - touch changes.env
    - |
      echo "FRONTEND_CHANGED=$(git diff --name-only ${CI_COMMIT_BEFORE_SHA} ${CI_COMMIT_SHA} | grep -q '^qurieus-frontend/' && echo true || echo false)" >> changes.env
      echo "BACKEND_CHANGED=$(git diff --name-only ${CI_COMMIT_BEFORE_SHA} ${CI_COMMIT_SHA} | grep -q '^qurieus-backend/' && echo true || echo false)" >> changes.env
      echo "BOT_CHANGED=$(git diff --name-only ${CI_COMMIT_BEFORE_SHA} ${CI_COMMIT_SHA} | grep -q '^qurieus-bot-teams/' && echo true || echo false)" >> changes.env
    - cat changes.env
  artifacts:
    reports:
      dotenv: changes.env
  rules:
    - if: '$RUN_PIPELINE == "true"'
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod"'

.deploy_base:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

deploy_staging:
  stage: deploy_staging
  needs: [check_changes]
  extends: .deploy_base
  variables:
    SSH_PRIVATE_KEY: $STAGING_SSH_PRIVATE_KEY
    SSH_USER: $STAGING_SSH_USER
    SERVER_IP: $STAGING_SERVER_IP
  script:
    - |
      F=$([ "$FRONTEND_CHANGED" = "true" ] || [ "$FORCE_FRONTEND" = "true" ] && echo "true" || echo "false")
      B=$([ "$BACKEND_CHANGED" = "true" ] || [ "$FORCE_BACKEND" = "true" ] && echo "true" || echo "false")
      O=$([ "$BOT_CHANGED" = "true" ] || [ "$FORCE_BOT" = "true" ] && echo "true" || echo "false")
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SERVER_IP} \
        "cd /home/ubuntu/qurieus && ./ci-cd/scripts/deploy-from-source.sh staging dev $F $B $O"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$RUN_PIPELINE == "true"'

deploy_production:
  stage: deploy_production
  needs: [check_changes]
  extends: .deploy_base
  variables:
    SSH_PRIVATE_KEY: $PROD_SSH_PRIVATE_KEY
    SSH_USER: $PROD_SSH_USER
    SERVER_IP: $PROD_SERVER_IP
  script:
    - |
      F=$([ "$FRONTEND_CHANGED" = "true" ] || [ "$FORCE_FRONTEND" = "true" ] && echo "true" || echo "false")
      B=$([ "$BACKEND_CHANGED" = "true" ] || [ "$FORCE_BACKEND" = "true" ] && echo "true" || echo "false")
      O=$([ "$BOT_CHANGED" = "true" ] || [ "$FORCE_BOT" = "true" ] && echo "true" || echo "false")
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SERVER_IP} \
        "cd /home/ubuntu/qurieus && ./ci-cd/scripts/deploy-from-source.sh prod prod $F $B $O"
  rules:
    - if: '$CI_COMMIT_BRANCH == "prod"'
    - if: '$RUN_PIPELINE == "true"'
