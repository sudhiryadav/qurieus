# GitLab CI/CD - No Docker. Push to prod → SSH → git pull, build, PM2 restart.
# PROD_SERVER_IP must be the server with /home/ubuntu/qurieus.
#
# Variable type guidance:
# - Scalar/Masked variables: PROD_SSH_PRIVATE_KEY, PROD_SSH_USER, PROD_SERVER_IP, PROD_REPO_DIR
# - File variables:
#   FRONTEND_ENV_PROD_FILE, BACKEND_ENV_PROD_FILE, BOT_ENV_PROD_FILE

variables:
  FORCE_FRONTEND: "false"
  FORCE_BACKEND: "false"
  FORCE_BOT: "false"

stages:
  - check_changes
  - deploy_production

check_changes:
  stage: check_changes
  image: alpine:latest
  script:
    - apk add --no-cache git
    - touch changes.env
    - |
      if [ -n "${CI_COMMIT_BEFORE_SHA}" ] && [ "${CI_COMMIT_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
        CHANGED_FILES="$(git diff --name-only "${CI_COMMIT_BEFORE_SHA}" "${CI_COMMIT_SHA}" || true)"
      else
        CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${CI_COMMIT_SHA}" || true)"
      fi
      [ -n "$CHANGED_FILES" ] || CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${CI_COMMIT_SHA}" || true)"
      printf "CHANGED_FILES:\n%s\n" "${CHANGED_FILES:-<none>}"
      echo "$CHANGED_FILES" | grep -Eq '^(qurieus-frontend/|ci-cd/scripts/|\.gitlab-ci\.yml$)' && echo "FRONTEND_CHANGED=true" >> changes.env || echo "FRONTEND_CHANGED=false" >> changes.env
      echo "$CHANGED_FILES" | grep -Eq '^(qurieus-backend/|\.gitlab-ci\.yml$)' && echo "BACKEND_CHANGED=true" >> changes.env || echo "BACKEND_CHANGED=false" >> changes.env
      echo "$CHANGED_FILES" | grep -Eq '^(qurieus-bot-teams/|\.gitlab-ci\.yml$)' && echo "BOT_CHANGED=true" >> changes.env || echo "BOT_CHANGED=false" >> changes.env
    - cat changes.env
  artifacts:
    reports:
      dotenv: changes.env
  rules:
    - if: '$CI_COMMIT_BRANCH == "prod"'

.deploy_base:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

deploy_production:
  stage: deploy_production
  needs: [check_changes]
  extends: .deploy_base
  variables:
    SSH_PRIVATE_KEY: $PROD_SSH_PRIVATE_KEY
    SSH_USER: $PROD_SSH_USER
    SERVER_IP: $PROD_SERVER_IP
  script:
    - |
      REPO_DIR="${PROD_REPO_DIR:-/home/ubuntu/qurieus}"
      BRANCH="prod"
      F=$([ "$FRONTEND_CHANGED" = "true" ] || [ "$FORCE_FRONTEND" = "true" ] && echo "true" || echo "false")
      B=$([ "$BACKEND_CHANGED" = "true" ] || [ "$FORCE_BACKEND" = "true" ] && echo "true" || echo "false")
      O=$([ "$BOT_CHANGED" = "true" ] || [ "$FORCE_BOT" = "true" ] && echo "true" || echo "false")
      [ -f "$FRONTEND_ENV_PROD_FILE" ] || (echo "Missing File var: FRONTEND_ENV_PROD_FILE" && exit 1)
      [ -f "$BACKEND_ENV_PROD_FILE" ] || (echo "Missing File var: BACKEND_ENV_PROD_FILE" && exit 1)
      [ -f "$BOT_ENV_PROD_FILE" ] || (echo "Missing File var: BOT_ENV_PROD_FILE" && exit 1)
      git clone --depth 50 --branch "$BRANCH" "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/frontslash/apps/qurieus.git" /tmp/qurieus-deploy
      rsync -avz --exclude=node_modules --exclude=.venv --exclude=.next --exclude=dist --exclude='*.env' --rsync-path="mkdir -p ${REPO_DIR} && rsync" -e "ssh -o StrictHostKeyChecking=no" /tmp/qurieus-deploy/ ${SSH_USER}@${SERVER_IP}:${REPO_DIR}/
      scp -o StrictHostKeyChecking=no "$FRONTEND_ENV_PROD_FILE" ${SSH_USER}@${SERVER_IP}:${REPO_DIR}/qurieus-frontend/.env
      scp -o StrictHostKeyChecking=no "$BACKEND_ENV_PROD_FILE" ${SSH_USER}@${SERVER_IP}:${REPO_DIR}/qurieus-backend/.env
      scp -o StrictHostKeyChecking=no "$BOT_ENV_PROD_FILE" ${SSH_USER}@${SERVER_IP}:${REPO_DIR}/qurieus-bot-teams/.env
      ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SERVER_IP} \
        "export REPO_DIR='${REPO_DIR}' SKIP_GIT_PULL=1 && cd \"\$REPO_DIR\" && bash ci-cd/scripts/deploy-from-source.sh prod prod $F $B $O"
  rules:
    - if: '$CI_COMMIT_BRANCH == "prod"'
