# GitLab CI/CD Pipeline for Qurieus Monorepo
# This pipeline builds and deploys only the applications that have changed

# Define variables available to all jobs
variables:
  # Container registry variables
  CI_REGISTRY_IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend
  CI_REGISTRY_IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  CI_REGISTRY_IMAGE_BOT: $CI_REGISTRY_IMAGE/msteams-bot
  # Set to "true" to skip build stage for faster testing
  SKIP_BUILD: "true"

# Define the stages of the pipeline
stages:
  - check_changes
  - build
  - deploy_staging
  - deploy_production

# Job to check which applications have changed
check_changes:
  stage: check_changes
  image: alpine:latest
  script:
    - apk add --no-cache git
    # Check if frontend has changed
    - |
      if git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA | grep -q "^qurieus-frontend/"; then
        echo "FRONTEND_CHANGED=true" >> changes.env
        echo "Frontend changes detected"
      else
        echo "FRONTEND_CHANGED=false" >> changes.env
        echo "No frontend changes"
      fi
    # Check if backend has changed
    - |
      if git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA | grep -q "^qurieus-backend/"; then
        echo "BACKEND_CHANGED=true" >> changes.env
        echo "Backend changes detected"
      else
        echo "BACKEND_CHANGED=false" >> changes.env
        echo "No backend changes"
      fi
    # Check if MSTeamsBot has changed
    - |
      if git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA | grep -q "^qurieus-bot-teams/"; then
        echo "BOT_CHANGED=true" >> changes.env
        echo "MSTeamsBot changes detected"
      else
        echo "BOT_CHANGED=false" >> changes.env
        echo "No MSTeamsBot changes"
      fi
    # Check if CI/CD configuration has changed
    - |
      if git diff --name-only $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA | grep -q "\.gitlab-ci\.yml\|scripts/"; then
        echo "CI_CHANGED=true" >> changes.env
        echo "CI/CD configuration changes detected"
      else
        echo "CI_CHANGED=false" >> changes.env
        echo "No CI/CD configuration changes"
      fi
    - cat changes.env
  artifacts:
    reports:
      dotenv: changes.env
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod"'

# Job to build the frontend Docker image (only if changed)
build_frontend:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [ "$SKIP_BUILD" = "true" ]; then
        echo "⏭️ Skipping build due to SKIP_BUILD=true"
        exit 0
      fi
    - cd qurieus-frontend
    - docker build -t $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_REF_SLUG .
    - docker push $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_REF_SLUG
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod"'
      variables:
        FRONTEND_CHANGED: "true"

# Job to build the backend Docker image (only if changed)
build_backend:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [ "$SKIP_BUILD" = "true" ]; then
        echo "⏭️ Skipping build due to SKIP_BUILD=true"
        exit 0
      fi
    - cd qurieus-backend
    - docker build -t $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_REF_SLUG .
    - docker push $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_REF_SLUG
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod"'
      variables:
        BACKEND_CHANGED: "true"

# Job to build the MSTeamsBot Docker image (only if changed)
build_msteams_bot:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [ "$SKIP_BUILD" = "true" ]; then
        echo "⏭️ Skipping build due to SKIP_BUILD=true"
        exit 0
      fi
    - cd qurieus-bot-teams
    - docker build -t $CI_REGISTRY_IMAGE_BOT:$CI_COMMIT_REF_SLUG .
    - docker push $CI_REGISTRY_IMAGE_BOT:$CI_COMMIT_REF_SLUG
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod"'
      variables:
        BOT_CHANGED: "true"

# Base configuration for deployment jobs to avoid repetition
.deploy_configuration: &deploy_configuration
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client bash curl
    - eval $(ssh-agent -s)
    # Create SSH directory and set permissions
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'

# Job to deploy to the staging environment
deploy_staging:
  stage: deploy_staging
  extends: .deploy_configuration
  variables:
    SSH_PRIVATE_KEY: $STAGING_SSH_PRIVATE_KEY
    SSH_USER: $STAGING_SSH_USER
    SERVER_IP: $STAGING_SERVER_IP
  script:
    - echo "🚀 Deploying to staging server..."
    - printenv | grep -i ssh
    # Setup SSH key
    - |
      echo "Checking SSH key variables..."
      echo "SSH_PRIVATE_KEY is set: $([ -n "$SSH_PRIVATE_KEY" ] && echo "YES" || echo "NO")"
      echo "STAGING_SSH_PRIVATE_KEY is set: $([ -n "$STAGING_SSH_PRIVATE_KEY" ] && echo "YES" || echo "NO")"
      echo "PROD_SSH_PRIVATE_KEY is set: $([ -n "$PROD_SSH_PRIVATE_KEY" ] && echo "YES" || echo "NO")"
      
      if [ -n "$SSH_PRIVATE_KEY" ]; then
        echo "Using SSH_PRIVATE_KEY variable..."
        echo "Decoding SSH key..."
        echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "SSH key file created, checking format..."
        head -1 ~/.ssh/id_rsa
        echo "Adding SSH key to agent..."
        ssh-add ~/.ssh/id_rsa
        echo "SSH key added successfully"
        ssh-add -l
      else
        echo "Error: SSH_PRIVATE_KEY is not set"
        echo "Available variables: SSH_PRIVATE_KEY, STAGING_SSH_PRIVATE_KEY, PROD_SSH_PRIVATE_KEY"
        exit 1
      fi
    - |
      ssh ${SSH_USER}@${SERVER_IP} "
        set -e &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        
        # Deploy Frontend only if changed
        if [ \"$FRONTEND_CHANGED\" = \"true\" ]; then
          echo 'Deploying Frontend...' &&
          cd /home/ubuntu/staging/qurieus-frontend &&
          export FRONTEND_IMAGE=$CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_REF_SLUG &&
          docker-compose pull &&
          docker-compose up -d --remove-orphans &&
          echo '✅ Frontend deployed successfully!'
        else
          echo '⏭️ Skipping Frontend deployment (no changes)'
        fi &&

        # Deploy Backend only if changed
        if [ \"$BACKEND_CHANGED\" = \"true\" ]; then
          echo 'Deploying Backend...' &&
          cd /home/ubuntu/staging/qurieus-backend &&
          export BACKEND_IMAGE=$CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_REF_SLUG &&
          docker-compose pull &&
          docker-compose up -d --remove-orphans &&
          echo '✅ Backend deployed successfully!'
        else
          echo '⏭️ Skipping Backend deployment (no changes)'
        fi &&
        
        # Deploy MSTeamsBot only if changed
        if [ \"$BOT_CHANGED\" = \"true\" ]; then
          echo 'Deploying MSTeamsBot...' &&
          cd /home/ubuntu/staging/qurieus-bot-teams &&
          export BOT_IMAGE=$CI_REGISTRY_IMAGE_BOT:$CI_COMMIT_REF_SLUG &&
          docker-compose pull &&
          docker-compose up -d --remove-orphans &&
          echo '✅ MSTeamsBot deployed successfully!'
        else
          echo '⏭️ Skipping MSTeamsBot deployment (no changes)'
        fi &&
        
        echo '✅ Staging deployment completed!'"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: on_success

# Job to deploy to the production environment
deploy_production:
  stage: deploy_production
  extends: .deploy_configuration
  variables:
    SSH_PRIVATE_KEY: $PROD_SSH_PRIVATE_KEY
    SSH_USER: $PROD_SSH_USER
    SERVER_IP: $PROD_SERVER_IP
  script:
    - echo "🚀 Deploying to production server..."
    - printenv | grep -i ssh
    # Setup SSH key
    - |
      echo "Checking SSH key variables..."
      echo "SSH_PRIVATE_KEY is set: $([ -n "$SSH_PRIVATE_KEY" ] && echo "YES" || echo "NO")"
      echo "STAGING_SSH_PRIVATE_KEY is set: $([ -n "$STAGING_SSH_PRIVATE_KEY" ] && echo "YES" || echo "NO")"
      echo "PROD_SSH_PRIVATE_KEY is set: $([ -n "$PROD_SSH_PRIVATE_KEY" ] && echo "YES" || echo "NO")"
      
      if [ -n "$SSH_PRIVATE_KEY" ]; then
        echo "Using SSH_PRIVATE_KEY variable..."
        echo "Decoding SSH key..."
        echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "SSH key file created, checking format..."
        head -1 ~/.ssh/id_rsa
        echo "Adding SSH key to agent..."
        ssh-add ~/.ssh/id_rsa
        echo "SSH key added successfully"
        ssh-add -l
      else
        echo "Error: SSH_PRIVATE_KEY is not set"
        echo "Available variables: SSH_PRIVATE_KEY, STAGING_SSH_PRIVATE_KEY, PROD_SSH_PRIVATE_KEY"
        exit 1
      fi
    - |
      ssh ${SSH_USER}@${SERVER_IP} "
        set -e &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        
        # Deploy Frontend only if changed
        if [ \"$FRONTEND_CHANGED\" = \"true\" ]; then
          echo 'Deploying Frontend...' &&
          cd /home/ubuntu/prod/qurieus-frontend &&
          export FRONTEND_IMAGE=$CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_REF_SLUG &&
          docker-compose pull &&
          docker-compose up -d --remove-orphans &&
          echo '✅ Frontend deployed successfully!'
        else
          echo '⏭️ Skipping Frontend deployment (no changes)'
        fi &&

        # Deploy Backend only if changed
        if [ \"$BACKEND_CHANGED\" = \"true\" ]; then
          echo 'Deploying Backend...' &&
          cd /home/ubuntu/prod/qurieus-backend &&
          export BACKEND_IMAGE=$CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_REF_SLUG &&
          docker-compose pull &&
          docker-compose up -d --remove-orphans &&
          echo '✅ Backend deployed successfully!'
        else
          echo '⏭️ Skipping Backend deployment (no changes)'
        fi &&
        
        # Deploy MSTeamsBot only if changed
        if [ \"$BOT_CHANGED\" = \"true\" ]; then
          echo 'Deploying MSTeamsBot...' &&
          cd /home/ubuntu/prod/qurieus-bot-teams &&
          export BOT_IMAGE=$CI_REGISTRY_IMAGE_BOT:$CI_COMMIT_REF_SLUG &&
          docker-compose pull &&
          docker-compose up -d --remove-orphans &&
          echo '✅ MSTeamsBot deployed successfully!'
        else
          echo '⏭️ Skipping MSTeamsBot deployment (no changes)'
        fi &&
        
        echo '✅ Production deployment completed!'"
  rules:
    - if: '$CI_COMMIT_BRANCH == "prod"'
      when: on_success